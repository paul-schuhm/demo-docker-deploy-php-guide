name: ci

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Docker auth + buildx
      # -----------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      # -----------------------------
      # Build image for tests
      # -----------------------------
      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          target: test
          load: true
          tags: local/test:latest

      # -----------------------------
      # SonarCloud (analysis + gate)
      # -----------------------------
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # - name: Sonar Quality Gate (fail if red)
      #   uses: SonarSource/sonarcloud-quality-gate-action@v1
      #   timeout-minutes: 5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # -----------------------------
      # Build final image (local only)
      # -----------------------------
      - name: Build final image (local)
        uses: docker/build-push-action@v7
        with:
          target: final
          load: true
          tags: ${{ vars.DOCKER_USERNAME }}/${{ github.event.repository.name }}:ci

      # -----------------------------
      # Docker Scout (fail on critical)
      # -----------------------------
      # - name: Docker Scout CVE scan (gating)
      #   uses: docker/scout-action@v1
      #   with:
      #     image: ${{ vars.DOCKER_USERNAME }}/${{ github.event.repository.name }}:ci
      #     command: cves
      #     only-severities: critical
      #     exit-code: true

      # -----------------------------
      # Push only if everything passed
      # -----------------------------
      - name: Build & push multi-arch
        uses: docker/build-push-action@v7
        with:
          target: final
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/${{ github.event.repository.name }}:latest
